name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --tb=short -q

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: claude-tracker-linux-x86_64
          - os: macos-latest
            artifact_name: claude-tracker-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies + PyInstaller
        run: uv sync --extra dev

      - name: Build binary
        run: |
          uv run pyinstaller \
            --onefile \
            --name claude-tracker \
            --add-data "src/claude_tracker/templates:claude_tracker/templates" \
            src/claude_tracker/cli.py

      - name: Rename artifact
        run: mv dist/claude-tracker dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Installation

            Run the one-liner installer (Linux, macOS, WSL2):
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            Or manually download the binary for your platform from the assets below,
            make it executable, and place it on your `$PATH`:
            ```bash
            chmod +x claude-tracker-*
            mv claude-tracker-* ~/.local/bin/claude-tracker
            ```

            ## Usage

            ```bash
            claude-tracker serve                  # sync + open dashboard at http://localhost:5555
            claude-tracker serve --port 8080      # custom port
            claude-tracker sync                   # sync data only
            ```
